services:
  node1:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: cart_node_1
    environment:
      - RELEASE_DISTRIBUTION=sname
      - RELEASE_NODE=node1@node1
      - RELEASE_COOKIE=ecom_tech_secret_cookie
      - CLUSTER_HOSTS=node1@node1,node2@node2,node3@node3
    ports:
      - "4001:4000"
    networks:
      - cart_net

  node2:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: cart_node_2
    environment:
      - RELEASE_DISTRIBUTION=sname
      - RELEASE_NODE=node2@node2
      - RELEASE_COOKIE=ecom_tech_secret_cookie
      - CLUSTER_HOSTS=node1@node1,node2@node2,node3@node3
    ports:
      - "4002:4000"
    networks:
      - cart_net

  node3:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: cart_node_3
    environment:
      - RELEASE_DISTRIBUTION=sname
      - RELEASE_NODE=node3@node3
      - RELEASE_COOKIE=ecom_tech_secret_cookie
      - CLUSTER_HOSTS=node1@node1,node2@node2,node3@node3
    ports:
      - "4003:4000"
    networks:
      - cart_net

networks:
  cart_net:
    driver: bridge
